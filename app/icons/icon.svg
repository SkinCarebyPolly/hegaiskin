<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3D2010"/>
      <stop offset="100%" style="stop-color:#2a1508"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e0bc76"/>
      <stop offset="100%" style="stop-color:#D4A853"/>
    </linearGradient>
    <linearGradient id="sage" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#AAB29A;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#AAB29A;stop-opacity:0.3"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Outer oval — principal frame -->
  <ellipse cx="256" cy="256" rx="192" ry="212" fill="none" stroke="url(#gold)" stroke-width="1.8" opacity="0.85"/>

  <!-- Inner oval — duplo refinado -->
  <ellipse cx="256" cy="256" rx="180" ry="200" fill="none" stroke="url(#gold)" stroke-width="0.6" opacity="0.35"/>

  <!-- Sage green dot top oval -->
  <circle cx="256" cy="44" r="3.5" fill="url(#sage)" opacity="0.8"/>
  <!-- Sage green dot bottom oval -->
  <circle cx="256" cy="468" r="3.5" fill="url(#sage)" opacity="0.8"/>

  <!-- Thin horizontal accent above HS -->
  <line x1="200" y1="182" x2="312" y2="182" stroke="url(#gold)" stroke-width="0.7" opacity="0.45"/>
  <!-- Small center dot on line -->
  <circle cx="256" cy="182" r="2.2" fill="url(#gold)" opacity="0.7"/>

  <!-- HS monogram — thin elegant serif -->
  <text x="256" y="310"
        font-family="Georgia,serif"
        font-size="148"
        font-weight="300"
        letter-spacing="-2"
        text-anchor="middle"
        fill="url(#gold)"
        opacity="0.95">HS</text>

  <!-- Thin horizontal accent below HS -->
  <line x1="200" y1="336" x2="312" y2="336" stroke="url(#gold)" stroke-width="0.7" opacity="0.45"/>
  <circle cx="256" cy="336" r="2.2" fill="url(#gold)" opacity="0.7"/>

  <!-- HEGAI SKIN wordmark -->
  <text x="256" y="378"
        font-family="Georgia,serif"
        font-size="26"
        font-weight="400"
        letter-spacing="9"
        text-anchor="middle"
        fill="url(#gold)"
        opacity="0.60">HEGAI SKIN</text>

  <!-- Corner sage green dots -->
  <circle cx="110" cy="138" r="2" fill="url(#sage)" opacity="0.5"/>
  <circle cx="402" cy="138" r="2" fill="url(#sage)" opacity="0.5"/>
  <circle cx="110" cy="374" r="2" fill="url(#sage)" opacity="0.5"/>
  <circle cx="402" cy="374" r="2" fill="url(#sage)" opacity="0.5"/>
</svg>
