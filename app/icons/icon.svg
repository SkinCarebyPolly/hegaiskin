<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0e09"/>
      <stop offset="100%" style="stop-color:#2d1a0c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0d9a8"/>
      <stop offset="100%" style="stop-color:#c9a96e"/>
    </linearGradient>
    <linearGradient id="goldSoft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8cfa0;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#c9a96e;stop-opacity:0.3"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#c9a96e;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#c9a96e;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Subtle glow behind center -->
  <ellipse cx="256" cy="240" rx="180" ry="160" fill="url(#glow)"/>

  <!-- Outer border ring -->
  <rect x="18" y="18" width="476" height="476" rx="88" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.35"/>
  <rect x="30" y="30" width="452" height="452" rx="78" fill="none" stroke="url(#gold)" stroke-width="0.6" opacity="0.15"/>

  <!-- Decorative top diamond / gem shape -->
  <polygon points="256,68 276,100 256,132 236,100" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.7"/>
  <polygon points="256,80 269,100 256,120 243,100" fill="url(#goldSoft)" opacity="0.8"/>

  <!-- Vertical center line -->
  <line x1="256" y1="135" x2="256" y2="165" stroke="url(#gold)" stroke-width="1" opacity="0.4"/>

  <!-- Face outline — stylized oval -->
  <ellipse cx="256" cy="235" rx="68" ry="80" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.55"/>

  <!-- Inner face shine -->
  <ellipse cx="256" cy="220" rx="38" ry="30" fill="none" stroke="url(#gold)" stroke-width="0.8" opacity="0.2"/>

  <!-- Left leaf -->
  <path d="M160,235 Q190,190 220,215 Q195,250 160,235 Z" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.55"/>
  <path d="M168,235 Q192,200 214,217" fill="none" stroke="url(#gold)" stroke-width="0.7" opacity="0.3"/>

  <!-- Right leaf -->
  <path d="M352,235 Q322,190 292,215 Q317,250 352,235 Z" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.55"/>
  <path d="M344,235 Q320,200 298,217" fill="none" stroke="url(#gold)" stroke-width="0.7" opacity="0.3"/>

  <!-- Stars / sparkles -->
  <g fill="url(#gold)" opacity="0.9">
    <!-- top left star -->
    <polygon points="136,148 139,156 148,156 141,161 144,170 136,165 128,170 131,161 124,156 133,156" transform="scale(0.7) translate(58,62)"/>
    <!-- top right star -->
    <polygon points="376,148 379,156 388,156 381,161 384,170 376,165 368,170 371,161 364,156 373,156" transform="scale(0.7) translate(-98,62)"/>
  </g>

  <!-- Small dot accents -->
  <circle cx="176" cy="160" r="2.5" fill="url(#gold)" opacity="0.6"/>
  <circle cx="336" cy="160" r="2.5" fill="url(#gold)" opacity="0.6"/>
  <circle cx="156" cy="235" r="2" fill="url(#gold)" opacity="0.4"/>
  <circle cx="356" cy="235" r="2" fill="url(#gold)" opacity="0.4"/>

  <!-- "HS" monogram elegant -->
  <text x="256" y="268" font-family="Georgia,serif" font-size="78" font-weight="400" letter-spacing="4" text-anchor="middle" fill="url(#gold)" opacity="0.95">HS</text>

  <!-- Thin horizontal ornament -->
  <line x1="170" y1="340" x2="342" y2="340" stroke="url(#gold)" stroke-width="0.8" opacity="0.35"/>
  <circle cx="256" cy="340" r="3" fill="url(#gold)" opacity="0.5"/>
  <circle cx="178" cy="340" r="1.5" fill="url(#gold)" opacity="0.35"/>
  <circle cx="334" cy="340" r="1.5" fill="url(#gold)" opacity="0.35"/>

  <!-- "HegaiSkin" wordmark -->
  <text x="256" y="390" font-family="Georgia,serif" font-size="36" font-weight="400" letter-spacing="7" text-anchor="middle" fill="url(#gold)" opacity="0.7">HEGAI</text>
  <text x="256" y="424" font-family="Georgia,serif" font-size="28" font-weight="400" letter-spacing="10" text-anchor="middle" fill="url(#gold)" opacity="0.5">SKIN</text>

  <!-- Bottom diamond accent -->
  <line x1="256" y1="438" x2="256" y2="460" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
  <polygon points="256,460 262,470 256,480 250,470" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.3"/>
</svg>
